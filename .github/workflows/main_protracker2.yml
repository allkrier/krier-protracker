# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - protracker2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm -r --if-present run build
        env:
          NODE_ENV: production
          PORT: "3000"
          BASE_PATH: "/"
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Prepare deployment package
        run: |
          mkdir -p deploy/public
          cp -r artifacts/protein-tracker/dist/public/. deploy/public/

          cat > deploy/server.js << 'SERVEREOF'
          const express = require("express");
          const path = require("path");
          const app = express();
          const PORT = process.env.PORT || 8080;
          const publicPath = path.join(__dirname, "public");
          app.use(express.static(publicPath));
          app.get("*", function(req, res) {
            res.sendFile(path.join(publicPath, "index.html"));
          });
          app.listen(PORT, function() {
            console.log("ProTracker running on port " + PORT);
          });
          SERVEREOF

          cat > deploy/package.json << 'PKGEOF'
          {
            "name": "protracker",
            "version": "1.0.0",
            "scripts": { "start": "node server.js" },
            "dependencies": { "express": "^4.21.2" }
          }
          PKGEOF

          cd deploy && npm install --production

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy/

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'protracker2'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_FDDACCBF1FEE4AF9A0F3B9AAC091763F }}
